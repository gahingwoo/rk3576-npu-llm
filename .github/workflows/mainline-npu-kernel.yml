name: mainline-npu-kernel

# Build a PURE mainline linux-7.1.3 kernel for the Radxa ROCK 4D (RK3576) with
# Kiln's NPU patches (kernel-patches 0001 + 0003 + 0004) -- no Armbian kernel
# patches. Built natively on a free arm64 GH runner; published as bindeb-pkg .debs.
#
# Trigger: Actions tab -> "mainline-npu-kernel" -> Run workflow.

on:
  workflow_dispatch:
    inputs:
      kver:
        description: "mainline kernel version (kernel.org v7.x)"
        default: "7.1.3"
      publish:
        description: "attach the .deb to a GitHub release"
        type: boolean
        default: true
  push:
    paths:
      - kernel-patches/**
      - .github/workflows/mainline-npu-kernel.yml

permissions:
  contents: write

concurrency:
  group: mainline-npu-kernel-${{ github.ref }}
  cancel-in-progress: true

env:
  KVER: ${{ github.event.inputs.kver || '7.1.3' }}
  ARMBIAN_CFG_TAG: armbian-npu-kernel-edge   # reuse its rock-4d .config as the base

jobs:
  build:
    # native arm64 runner (free for public repos): build native, so no
    # cross-toolchain and no cross-arch build-dep hell for dpkg-buildpackage.
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 180
    steps:
      - name: Checkout Kiln
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/.ghcup /opt/hostedtoolcache/CodeQL /usr/local/share/boost || true
          sudo docker image prune --all --force || true
          df -h /

      - name: Install build deps (native arm64)
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev libelf-dev libdw-dev \
            build-essential dpkg-dev debhelper rsync kmod cpio xz-utils

      - name: Fetch mainline linux-${{ env.KVER }}
        run: |
          curl -fsSL "https://cdn.kernel.org/pub/linux/kernel/v7.x/linux-${KVER}.tar.xz" | tar xJ
          echo "KDIR=$PWD/linux-${KVER}" >> "$GITHUB_ENV"

      - name: Apply Kiln kernel patches (0001..0006)
        run: |
          cd "$KDIR"
          for p in 0001 0002 0003 0004 0005 0006; do
            f="$(ls "$GITHUB_WORKSPACE"/kernel-patches/${p}-*.patch)"
            echo "applying $(basename "$f")"; patch -p1 < "$f"
          done

      - name: Configure (ROCK 4D config base + disable rocket)
        run: |
          cd "$KDIR"
          # Reuse the boot-tested ROCK 4D .config from the Armbian 7.1 kernel release;
          # olddefconfig reconciles it to pure mainline. Fall back to defconfig.
          url="$(curl -fsSL "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${ARMBIAN_CFG_TAG}" \
                 | grep -o 'https://[^"]*linux-image[^"]*\.deb' | head -1 || true)"
          if [ -n "$url" ] && curl -fsSL "$url" -o /tmp/aimg.deb; then
            dpkg-deb -x /tmp/aimg.deb /tmp/aimg
            cfg="$(find /tmp/aimg -name 'config-*' | head -1)"
            [ -n "$cfg" ] && cp "$cfg" .config && echo "base config: $(basename "$cfg")"
          fi
          [ -f .config ] || make ARCH=arm64 defconfig
          # vendor rknpu (out-of-tree) is used, not the open rocket driver
          ./scripts/config --disable DRM_ACCEL_ROCKET
          # keep the pieces the NPU stack needs on
          ./scripts/config --enable ROCKCHIP_IOMMU --enable ARM_ROCKCHIP_CPUFREQ || true
          # ROOT-ON-NVME: the ROCK 4D's M.2 NVMe sits behind the RK3576 PCIe3 PHY.
          # The base config has it =m, so it isn't up at boot -> NVMe not found ->
          # initramfs. Force the PCIe controller + both PHYs built-in so root mounts.
          ./scripts/config --enable PHY_ROCKCHIP_SNPS_PCIE3 \
                           --enable PHY_ROCKCHIP_NANENG_COMBO_PHY \
                           --enable PCIE_ROCKCHIP_DW_HOST \
                           --enable PCIE_DW_ROCKCHIP \
                           --enable BLK_DEV_NVME --enable NVME_CORE || true
          make ARCH=arm64 olddefconfig
          echo "--- PCIe/NVMe after olddefconfig ---"
          grep -E 'PHY_ROCKCHIP_SNPS_PCIE3|PCIE_ROCKCHIP_DW|BLK_DEV_NVME=' .config

      - name: Build (bindeb-pkg)
        run: |
          cd "$KDIR"
          make -j"$(nproc)" ARCH=arm64 \
            KDEB_PKGVERSION="$(date -u +%Y%m%d)" bindeb-pkg

      - name: Collect .deb packages
        run: |
          mkdir -p "$GITHUB_WORKSPACE/out"
          mv linux-image-*.deb linux-headers-*.deb "$GITHUB_WORKSPACE/out/" 2>/dev/null || \
            mv "$KDIR"/../linux-image-*.deb "$KDIR"/../linux-headers-*.deb "$GITHUB_WORKSPACE/out/"
          rm -f "$GITHUB_WORKSPACE"/out/*-dbg_*.deb   # drop the huge debug-symbol image
          echo "--- built ---"; ls -l "$GITHUB_WORKSPACE/out"
          test -n "$(ls -A "$GITHUB_WORKSPACE"/out 2>/dev/null)" || { echo "no .deb produced"; exit 1; }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kiln-mainline-npu-kernel-${{ env.KVER }}
          path: out/*.deb
          if-no-files-found: error

      - name: Publish to a release
        if: ${{ github.event.inputs.publish != 'false' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=kiln-mainline-kernel
          NOTES="Pure mainline linux-${KVER} for Radxa ROCK 4D (RK3576) + Kiln NPU patches (0001 settle-delay, 0003 iommu clocks, 0004 vendor rknpu DT node). bindeb-pkg. Install per MAINLINE-KERNEL.md / kiln-install.sh."
          if gh release view "$TAG" >/dev/null 2>&1; then
            # clear stale assets first so the installer never picks an old build
            gh release view "$TAG" --json assets --jq '.assets[].name' \
              | xargs -r -I{} gh release delete-asset "$TAG" {} -y || true
            gh release upload "$TAG" out/*.deb --clobber
          else
            gh release create "$TAG" out/*.deb --title "Kiln mainline NPU kernel (linux-${KVER})" --notes "$NOTES"
          fi
